[General]
#abstract-config = true (requires omnet 7)

**.routingTable.netmaskRoutes = ""

# interface visualization settings
*.visualizer.*.interfaceTableVisualizer.displayInterfaceTables = true
*.visualizer.*.interfaceTableVisualizer.interfaceFilter = "not(lo*)"
*.visualizer.*.interfaceTableVisualizer.nodeFilter = "not(*switch*)"
*.visualizer.*.interfaceTableVisualizer.displayWiredInterfacesAtConnections = false
*.visualizer.*.interfaceTableVisualizer.format = "%N %n"

#==============================================================================
# Custom AODV Router Configuration
#==============================================================================

[Config CustomAodv]
network = CustomAodvNetwork
description = "Custom AODV Router with socket communication"
sim-time-limit = 100s

# Configurator settings - manual IP assignment
*.configurator.config = xml("<config> \
    <interface hosts='node1' names='wlan0' address='192.168.17.1' netmask='255.255.255.0'/> \
    <interface hosts='node2' names='wlan0' address='192.168.17.2' netmask='255.255.255.0'/> \
    <interface hosts='node3' names='wlan0' address='192.168.17.3' netmask='255.255.255.0'/> \
    <interface hosts='node4' names='wlan0' address='192.168.17.4' netmask='255.255.255.0'/> \
    <interface hosts='node5' names='wlan0' address='192.168.17.5' netmask='255.255.255.0'/> \
</config>")

*.configurator.addStaticRoutes = false
*.configurator.dumpAddresses = true
*.configurator.dumpTopology = true
*.configurator.dumpRoutes = true

# Wireless settings
**.displayCommunicationRanges = true
**.transmitter.power = 2mW

# AODV routing protocol settings
*.node*.routing.typename = "Aodv"
*.node*.routing.activeRouteTimeout = 3s
*.node*.routing.helloInterval = 1s
*.node*.routing.netDiameter = 35
*.node*.routing.nodeTraversalTime = 0.04s
*.node*.routing.allowedHelloLoss = 2

# Custom App Configuration - node1 sends to node5
*.node1.numCustomApps = 1
*.node1.customApp[0].typename = "CustomAodvApp"
*.node1.customApp[0].localPort = 5000
*.node1.customApp[0].destPort = 5000
*.node1.customApp[0].destAddress = "node5"
*.node1.customApp[0].messageLength = 512B
*.node1.customApp[0].sendInterval = 2s
*.node1.customApp[0].startTime = 5s

# node5 listens for incoming packets
*.node5.numCustomApps = 1
*.node5.customApp[0].typename = "CustomAodvApp"
*.node5.customApp[0].localPort = 5000
*.node5.customApp[0].destAddress = ""  # receiver only

# Other nodes - no custom apps by default
*.node2.numCustomApps = 0
*.node3.numCustomApps = 0
*.node4.numCustomApps = 0

# Visualization
*.visualizer.*.routingTableVisualizer.displayRoutingTables = true
*.visualizer.*.routingTableVisualizer.displayRoutesIndividually = false
*.visualizer.*.networkRouteVisualizer.displayRoutes = true

#==============================================================================
# Alternative: Bidirectional Communication
#==============================================================================

[Config CustomAodvBidirectional]
extends = CustomAodv
description = "Custom AODV with bidirectional socket communication"

# node1 sends to node5
*.node1.customApp[0].destAddress = "node5"
*.node1.customApp[0].startTime = 5s

# node5 sends back to node1
*.node5.customApp[0].destAddress = "node1"
*.node5.customApp[0].startTime = 6s
*.node5.customApp[0].sendInterval = 2s

#==============================================================================
# Alternative: Multi-node Communication
#==============================================================================

[Config CustomAodvMultiNode]
extends = CustomAodv
description = "Multiple nodes communicating with each other"

# Enable custom apps on all nodes
*.node*.numCustomApps = 1
*.node*.customApp[0].typename = "CustomAodvApp"
*.node*.customApp[0].localPort = 5000
*.node*.customApp[0].destPort = 5000
*.node*.customApp[0].messageLength = 256B
*.node*.customApp[0].sendInterval = 3s

# Set up communication paths
*.node1.customApp[0].destAddress = "node3"
*.node1.customApp[0].startTime = 5s

*.node2.customApp[0].destAddress = "node4"
*.node2.customApp[0].startTime = 6s

*.node3.customApp[0].destAddress = "node5"
*.node3.customApp[0].startTime = 7s

*.node4.customApp[0].destAddress = "node1"
*.node4.customApp[0].startTime = 8s

*.node5.customApp[0].destAddress = "node2"
*.node5.customApp[0].startTime = 9s

#==============================================================================
# Original Dynamic Config
#==============================================================================

[Config Dynamic]
network = RoutingTableVisualizationDynamicShowcase
description = "Visualizing changing routing tables"

# config
*.configurator.dumpAddresses = true
*.configurator.dumpTopology = true
*.configurator.dumpLinks = true
*.configurator.dumpRoutes = true

# visualizer parameters
*.visualizer.*.routingTableVisualizer.destinationFilter = "destinationHost"
*.visualizer.*.routingTableVisualizer.displayRoutingTables = true

*.visualizer.*.interfaceTableVisualizer.displayInterfaceTables = false

# mobility parameters
*.destinationHost.mobility.typename = "LinearMobility"
*.*.mobility.speed = 10mps
*.destinationHost.mobility.initialMovementHeading = 90deg
*.*.mobility.constraintAreaMinY = 0m
*.*.mobility.constraintAreaMaxY = 600m

*.visualizer.*.mobilityVisualizer.animationSpeed = 0.1

# app parameters
*.sourceHost.numApps = 1
*.sourceHost.app[0].typename = "PingApp"
*.sourceHost.app[*].destAddr = "destinationHost"

# communication range parameters
**.displayCommunicationRanges = true
**.transmitter.power = 1mW

# configurator parameters
*.configurator.addStaticRoutes = false
